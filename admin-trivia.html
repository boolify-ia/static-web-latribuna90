<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Trivia — La Tribuna 90</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --brown: #36130E; --brown-dark: #1a0a08; --green: #314B36;
      --green-light: #3d5e43; --gold: #D4AF37; --red: #C5452E;
      --cream: #F5F0E8; --text-muted: rgba(245,240,232,0.6);
      --ff-title: 'Bebas Neue',sans-serif; --ff-sub: 'Oswald',sans-serif; --ff-body: 'Lato',sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--ff-body); background:var(--brown-dark); color:var(--cream); min-height:100vh; padding:2rem 1rem 4rem; }
    .container { max-width:700px; margin:0 auto; display:flex; flex-direction:column; gap:1.5rem; }
    h1 { font-family:var(--ff-title); font-size:2.5rem; color:var(--gold); letter-spacing:.05em; }
    .subtitle { color:var(--text-muted); font-size:.9rem; }

    /* LOGIN */
    #login-screen { display:flex; flex-direction:column; gap:1rem; max-width:340px; margin:4rem auto; }
    #login-screen h2 { font-family:var(--ff-sub); color:var(--gold); text-align:center; }
    input[type=password], input[type=text], input[type=number] {
      background:rgba(255,255,255,.06); border:1px solid rgba(212,175,55,.3); border-radius:.6rem;
      padding:.8rem 1rem; color:var(--cream); font-family:var(--ff-body); font-size:1rem; outline:none; width:100%;
    }
    input:focus { border-color:var(--gold); }

    .card { background:rgba(54,19,14,.6); border:1px solid rgba(212,175,55,.25); border-radius:1rem; padding:1.75rem; }
    .card h2 { font-family:var(--ff-sub); font-size:1.1rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); margin-bottom:1rem; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.4rem; font-family:var(--ff-sub); font-weight:600; font-size:.9rem; letter-spacing:.06em; text-transform:uppercase; padding:.7rem 1.25rem; border-radius:.6rem; border:none; cursor:pointer; transition:all .2s; }
    .btn-gold { background:linear-gradient(135deg,var(--gold),#b8960c); color:var(--brown-dark); }
    .btn-gold:hover { filter:brightness(1.1); }
    .btn-red { background:var(--red); color:white; }
    .btn-red:hover { background:#a33824; }
    .btn-outline { background:transparent; border:1px solid var(--gold); color:var(--gold); }
    .btn-outline:hover { background:rgba(212,175,55,.1); }
    .btn-sm { padding:.4rem .8rem; font-size:.75rem; }

    /* TOKEN GENERATOR */
    .token-gen { display:flex; gap:.75rem; align-items:flex-end; flex-wrap:wrap; }
    .token-gen .field { display:flex; flex-direction:column; gap:.35rem; flex:1; min-width:120px; }
    .token-gen label { font-family:var(--ff-sub); font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); }
    .token-output { font-family:'Courier New', monospace; font-size:1.8rem; font-weight:700; color:var(--gold); letter-spacing:.2em; text-align:center; padding:1rem; background:rgba(0,0,0,.3); border-radius:.75rem; border:2px dashed rgba(212,175,55,.4); margin:.75rem 0; cursor:pointer; transition:background .2s; }
    .token-output:hover { background:rgba(212,175,55,.06); }
    .copy-hint { text-align:center; font-size:.75rem; color:var(--text-muted); }
    .copied-toast { color:#81c784; font-size:.8rem; text-align:center; height:1rem; }

    /* TOKEN LIST */
    .token-table { width:100%; border-collapse:collapse; font-size:.85rem; }
    .token-table th { font-family:var(--ff-sub); font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:.5rem .75rem; text-align:left; border-bottom:1px solid rgba(212,175,55,.15); }
    .token-table td { padding:.6rem .75rem; border-bottom:1px solid rgba(255,255,255,.05); }
    .badge { display:inline-block; padding:.2rem .6rem; border-radius:2rem; font-size:.7rem; font-family:var(--ff-sub); font-weight:600; text-transform:uppercase; }
    .badge-green { background:rgba(49,75,54,.5); color:#81c784; border:1px solid rgba(129,199,132,.3); }
    .badge-red { background:rgba(197,69,46,.3); color:#ef9a9a; border:1px solid rgba(239,154,154,.3); }
    .badge-gold { background:rgba(212,175,55,.15); color:var(--gold); border:1px solid rgba(212,175,55,.3); }

    /* RANKING */
    .rank-item { display:flex; align-items:center; gap:1rem; padding:.7rem; border-bottom:1px solid rgba(255,255,255,.05); }
    .rank-pos { font-family:var(--ff-title); font-size:1.4rem; width:30px; text-align:center; color:var(--text-muted); flex-shrink:0; }
    .rank-name { flex:1; font-family:var(--ff-sub); font-weight:600; }
    .rank-score { font-family:var(--ff-title); font-size:1.4rem; color:var(--gold); }
    .rank-detail { font-size:.72rem; color:var(--text-muted); }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
    .stat-box { background:rgba(0,0,0,.2); border-radius:.75rem; padding:1rem; text-align:center; }
    .stat-val { font-family:var(--ff-title); font-size:2.2rem; color:var(--gold); }
    .stat-label { font-family:var(--ff-sub); font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); }

    .empty { text-align:center; color:var(--text-muted); padding:1.5rem; font-size:.9rem; }
    .loading { text-align:center; color:var(--text-muted); padding:1rem; }
    .spinner { display:inline-block; width:24px; height:24px; border:2px solid rgba(212,175,55,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .actions-row { display:flex; gap:.5rem; flex-wrap:wrap; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .section-header h2 { margin-bottom:0; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔐 Admin La Tribuna 90</h2>
  <input type="password" id="admin-pass" placeholder="Contraseña admin" onkeydown="if(event.key==='Enter')login()">
  <button class="btn btn-gold" onclick="login()"><i class="fas fa-lock-open"></i> Entrar</button>
  <p id="login-err" style="color:var(--red);text-align:center;font-size:.85rem;min-height:1rem"></p>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none">
  <div class="container">
    <div>
      <h1>🎮 Admin Trivia</h1>
      <p class="subtitle">La Tribuna 90 · Panel de control de la trivia futbolera</p>
    </div>

    <!-- STATS -->
    <div class="card">
      <h2>📊 Estadísticas</h2>
      <div class="stats-row" id="stats-row">
        <div class="stat-box"><div class="stat-val" id="s-tokens">—</div><div class="stat-label">Tokens creados</div></div>
        <div class="stat-box"><div class="stat-val" id="s-used">—</div><div class="stat-label">Tokens usados</div></div>
        <div class="stat-box"><div class="stat-val" id="s-players">—</div><div class="stat-label">Jugadores</div></div>
      </div>
    </div>

    <!-- GENERAR TOKEN -->
    <div class="card">
      <h2>🎟️ Generar Token</h2>
      <div class="token-gen">
        <div class="field">
          <label>Cantidad</label>
          <input type="number" id="gen-qty" value="1" min="1" max="20" style="width:80px">
        </div>
        <button class="btn btn-gold" onclick="generateTokens()"><i class="fas fa-plus"></i> Generar</button>
      </div>
      <div id="generated-area" style="display:none">
        <div class="token-output" id="token-display" onclick="copyToken()" title="Clic para copiar">— — —</div>
        <div class="copy-hint">👆 Toca para copiar · Entrégalo al cliente</div>
        <div class="copied-toast" id="copied-toast"></div>
        <div class="actions-row" style="margin-top:.75rem;justify-content:center">
          <button class="btn btn-outline btn-sm" onclick="generateTokens()"><i class="fas fa-redo"></i> Nuevo</button>
          <button class="btn btn-outline btn-sm" onclick="printToken()"><i class="fas fa-print"></i> Imprimir</button>
        </div>
      </div>
      <!-- Lista tokens generados en esta sesión -->
      <div id="session-tokens" style="margin-top:1rem"></div>
    </div>

    <!-- TOKENS ACTIVOS -->
    <div class="card">
      <div class="section-header">
        <h2>🔑 Tokens Activos</h2>
        <button class="btn btn-outline btn-sm" onclick="loadTokens()"><i class="fas fa-sync"></i> Refrescar</button>
      </div>
      <div id="tokens-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- RANKING -->
    <div class="card">
      <div class="section-header">
        <h2>🏆 Ranking General</h2>
        <div class="actions-row">
          <button class="btn btn-outline btn-sm" onclick="loadRanking()"><i class="fas fa-sync"></i> Refrescar</button>
          <button class="btn btn-red btn-sm" onclick="clearRanking()"><i class="fas fa-trash"></i> Limpiar</button>
        </div>
      </div>
      <div id="ranking-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <div style="text-align:center">
      <a href="trivia.html" target="_blank" class="btn btn-outline"><i class="fas fa-external-link-alt"></i> Ver página de trivia</a>
      &nbsp;
      <a href="index.html" class="btn btn-outline"><i class="fas fa-home"></i> Ir al sitio</a>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = 'tribuna90admin';

function login() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-err').textContent = 'Contraseña incorrecta';
  }
}

// ============================================================
// STORAGE
// ============================================================
async function sGet(key, shared=true) {
  try { const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; } catch { return null; }
}
async function sSet(key, val, shared=true) {
  try { await window.storage.set(key, JSON.stringify(val), shared); } catch(e) { console.error(e); }
}
async function sDel(key, shared=true) {
  try { await window.storage.delete(key, shared); } catch {}
}

// ============================================================
// LOAD ALL
// ============================================================
async function loadAll() {
  await Promise.all([loadStats(), loadTokens(), loadRanking()]);
}

async function loadStats() {
  const valid = await sGet('trivia:valid-tokens') || {};
  const used  = await sGet('trivia:used-tokens')  || {};
  const ranking = await sGet('trivia:ranking')   || [];
  document.getElementById('s-tokens').textContent  = Object.keys(valid).length;
  document.getElementById('s-used').textContent    = Object.keys(used).length;
  document.getElementById('s-players').textContent = ranking.length;
}

// ============================================================
// TOKEN GENERATION
// ============================================================
const sessionTokens = [];

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return 'TRB-' + Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function generateTokens() {
  const qty = parseInt(document.getElementById('gen-qty').value) || 1;
  const valid = await sGet('trivia:valid-tokens') || {};
  const newTokens = [];
  for (let i = 0; i < qty; i++) {
    let code;
    do { code = genCode(); } while (valid[code]);
    valid[code] = { created: new Date().toISOString() };
    newTokens.push(code);
    sessionTokens.push(code);
  }
  await sSet('trivia:valid-tokens', valid);

  // Mostrar el último generado
  document.getElementById('generated-area').style.display = 'block';
  document.getElementById('token-display').textContent = newTokens[newTokens.length - 1];
  document.getElementById('copied-toast').textContent = '';

  // Mostrar los de esta sesión
  renderSessionTokens();
  loadStats();
  loadTokens();
}

function renderSessionTokens() {
  const el = document.getElementById('session-tokens');
  if (!sessionTokens.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <p style="font-family:var(--ff-sub);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.5rem">Generados en esta sesión:</p>
    <div style="display:flex;flex-wrap:wrap;gap:.4rem">
      ${sessionTokens.map(t => `<span class="badge badge-gold" style="font-size:.85rem;letter-spacing:.1em;cursor:pointer" onclick="copyText('${t}')">${t}</span>`).join('')}
    </div>
  `;
}

function copyToken() {
  const txt = document.getElementById('token-display').textContent;
  copyText(txt);
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('copied-toast').textContent = `✅ Copiado: ${txt}`;
    setTimeout(() => { if(document.getElementById('copied-toast')) document.getElementById('copied-toast').textContent = ''; }, 2000);
  });
}

function printToken() {
  const token = document.getElementById('token-display').textContent;
  const w = window.open('', '_blank', 'width=400,height=300');
  w.document.write(`
    <html><body style="font-family:'Courier New';text-align:center;padding:2rem;background:white">
    <p style="font-size:14px;margin-bottom:.5rem">LA TRIBUNA 90 · Trivia Fútbol</p>
    <p style="font-size:11px;color:#666;margin-bottom:1rem">Ingresa en: ${window.location.origin}/trivia.html</p>
    <p style="font-size:36px;font-weight:bold;letter-spacing:.2em;border:2px dashed #333;padding:1rem;display:inline-block">${token}</p>
    <p style="font-size:11px;color:#999;margin-top:1rem">Código de un solo uso · No compartir</p>
    </body></html>
  `);
  w.print();
}

// ============================================================
// TOKENS LIST
// ============================================================
async function loadTokens() {
  const el = document.getElementById('tokens-list');
  const valid = await sGet('trivia:valid-tokens') || {};
  const used  = await sGet('trivia:used-tokens')  || {};
  const all = Object.entries(valid);
  if (!all.length) { el.innerHTML = '<div class="empty">No hay tokens creados aún</div>'; return; }

  const rows = all.reverse().slice(0, 50).map(([code, meta]) => {
    const isUsed = !!used[code];
    const usedBy = isUsed ? used[code].name : '—';
    return `<tr>
      <td style="font-family:'Courier New';font-size:1rem;letter-spacing:.1em;color:var(--gold)">${code}</td>
      <td><span class="badge ${isUsed ? 'badge-red' : 'badge-green'}">${isUsed ? 'Usado' : 'Disponible'}</span></td>
      <td>${usedBy}</td>
      <td><button class="btn btn-red btn-sm" onclick="deleteToken('${code}')"><i class="fas fa-trash"></i></button></td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table class="token-table">
    <thead><tr><th>Código</th><th>Estado</th><th>Usado por</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function deleteToken(code) {
  if (!confirm(`¿Eliminar token ${code}?`)) return;
  const valid = await sGet('trivia:valid-tokens') || {};
  delete valid[code];
  await sSet('trivia:valid-tokens', valid);
  loadTokens(); loadStats();
}

// ============================================================
// RANKING
// ============================================================
async function loadRanking() {
  const el = document.getElementById('ranking-list');
  const ranking = await sGet('trivia:ranking') || [];
  if (!ranking.length) { el.innerHTML = '<div class="empty">No hay partidas registradas aún</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = ranking.slice(0, 30).map((r, i) => `
    <div class="rank-item">
      <div class="rank-pos">${medals[i] || i+1}</div>
      <div>
        <div class="rank-name">${r.name}</div>
        <div class="rank-detail">${r.correct}/${r.correct+r.wrong} correctas · Prom. ${r.avgTime}s · ${r.date}</div>
      </div>
      <div class="rank-score">${r.score} pts</div>
    </div>
  `).join('');
}

async function clearRanking() {
  if (!confirm('¿Limpiar todo el ranking? Esta acción no se puede deshacer.')) return;
  await sDel('trivia:ranking');
  loadRanking(); loadStats();
}
</script>
</body>
</html>
