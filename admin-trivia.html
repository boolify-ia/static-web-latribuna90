<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Trivia — La Tribuna 90</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--brown:#36130E;--brown-dark:#1a0a08;--green:#314B36;--gold:#D4AF37;--red:#C5452E;--cream:#F5F0E8;--muted:rgba(245,240,232,0.6);--ff-t:'Bebas Neue',sans-serif;--ff-s:'Oswald',sans-serif;--ff-b:'Lato',sans-serif;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--ff-b);background:var(--brown-dark);color:var(--cream);min-height:100vh;padding:2rem 1rem 4rem;}
    .container{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;}
    h1{font-family:var(--ff-t);font-size:2.4rem;color:var(--gold);letter-spacing:.05em;}
    .subtitle{color:var(--muted);font-size:.85rem;}
    /* LOGIN */
    #login-screen{display:flex;flex-direction:column;gap:1rem;max-width:320px;margin:5rem auto;align-items:center;}
    #login-screen h2{font-family:var(--ff-s);color:var(--gold);text-align:center;font-size:1.3rem;}
    input[type=password],input[type=text],input[type=number]{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.3);border-radius:.6rem;padding:.8rem 1rem;color:var(--cream);font-family:var(--ff-b);font-size:1rem;outline:none;width:100%;}
    input:focus{border-color:var(--gold);}
    .card{background:rgba(54,19,14,.6);border:1px solid rgba(212,175,55,.22);border-radius:1rem;padding:1.75rem;}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;}
    .card-header h2{font-family:var(--ff-s);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin:0;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-family:var(--ff-s);font-weight:600;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;padding:.65rem 1.1rem;border-radius:.6rem;border:none;cursor:pointer;transition:all .2s;}
    .btn-gold{background:linear-gradient(135deg,var(--gold),#b8960c);color:var(--brown-dark);}
    .btn-gold:hover{filter:brightness(1.1);}
    .btn-red{background:var(--red);color:#fff;}
    .btn-red:hover{background:#a33824;}
    .btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);}
    .btn-outline:hover{background:rgba(212,175,55,.1);}
    .btn-sm{padding:.35rem .75rem;font-size:.72rem;}
    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
    .stat-box{background:rgba(0,0,0,.25);border-radius:.75rem;padding:1rem;text-align:center;}
    .stat-val{font-family:var(--ff-t);font-size:2.2rem;color:var(--gold);}
    .stat-label{font-family:var(--ff-s);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
    /* TOKEN GEN */
    .gen-row{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;}
    .gen-row .field{display:flex;flex-direction:column;gap:.35rem;}
    .gen-row label{font-family:var(--ff-s);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .token-display{font-family:'Courier New',monospace;font-size:1.9rem;font-weight:700;color:var(--gold);letter-spacing:.2em;text-align:center;padding:.9rem;background:rgba(0,0,0,.3);border-radius:.7rem;border:2px dashed rgba(212,175,55,.4);margin:.75rem 0;cursor:pointer;}
    .token-display:hover{background:rgba(212,175,55,.06);}
    .copy-hint{text-align:center;font-size:.72rem;color:var(--muted);}
    .toast{text-align:center;color:#81c784;font-size:.78rem;min-height:1rem;margin-top:.25rem;}
    .session-tokens{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.75rem;}
    .badge{display:inline-block;padding:.2rem .65rem;border-radius:2rem;font-size:.72rem;font-family:var(--ff-s);font-weight:600;text-transform:uppercase;}
    .badge-gold{background:rgba(212,175,55,.15);color:var(--gold);border:1px solid rgba(212,175,55,.3);cursor:pointer;}
    .badge-green{background:rgba(49,75,54,.5);color:#81c784;border:1px solid rgba(129,199,132,.3);}
    .badge-red{background:rgba(197,69,46,.3);color:#ef9a9a;border:1px solid rgba(239,154,154,.3);}
    /* TABLE */
    table{width:100%;border-collapse:collapse;font-size:.83rem;}
    th{font-family:var(--ff-s);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.5rem .7rem;text-align:left;border-bottom:1px solid rgba(212,175,55,.12);}
    td{padding:.55rem .7rem;border-bottom:1px solid rgba(255,255,255,.04);}
    td.mono{font-family:'Courier New';font-size:.95rem;letter-spacing:.08em;color:var(--gold);}
    /* RANKING */
    .rank-item{display:flex;align-items:center;gap:.9rem;padding:.65rem .5rem;border-bottom:1px solid rgba(255,255,255,.05);}
    .rank-pos{font-family:var(--ff-t);font-size:1.3rem;width:26px;text-align:center;color:var(--muted);flex-shrink:0;}
    .rank-info{flex:1;}
    .rank-name{font-family:var(--ff-s);font-weight:600;font-size:.88rem;}
    .rank-detail{font-size:.68rem;color:var(--muted);}
    .rank-score{font-family:var(--ff-t);font-size:1.35rem;color:var(--gold);}
    .empty{text-align:center;color:var(--muted);padding:1.5rem;font-size:.88rem;}
    .spinner-wrap{text-align:center;padding:1rem;}
    .spinner{display:inline-block;width:22px;height:22px;border:2px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .actions-row{display:flex;gap:.5rem;flex-wrap:wrap;}
    .month-badge{font-family:var(--ff-s);font-size:.75rem;color:var(--gold);background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:2rem;padding:.25rem .8rem;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div style="font-size:3rem">🔐</div>
  <h2>Admin La Tribuna 90</h2>
  <input type="password" id="admin-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
  <button class="btn btn-gold" onclick="login()" style="width:100%"><i class="fas fa-lock-open"></i> Entrar</button>
  <p id="login-err" style="color:var(--red);font-size:.82rem;min-height:1rem;text-align:center"></p>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
<div class="container">
  <div><h1>🎮 Admin Trivia</h1><p class="subtitle">La Tribuna 90 · Panel de control</p></div>

  <!-- STATS -->
  <div class="card">
    <div class="card-header"><h2>📊 Estadísticas</h2><span class="month-badge" id="month-label">—</span></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="s-tokens">—</div><div class="stat-label">Tokens creados</div></div>
      <div class="stat-box"><div class="stat-val" id="s-used">—</div><div class="stat-label">Tokens usados</div></div>
      <div class="stat-box"><div class="stat-val" id="s-players">—</div><div class="stat-label">Partidas este mes</div></div>
    </div>
  </div>

  <!-- GENERAR TOKEN -->
  <div class="card">
    <div class="card-header"><h2>🎟️ Generar Token</h2></div>
    <div class="gen-row">
      <div class="field"><label>Cantidad</label><input type="number" id="gen-qty" value="1" min="1" max="20" style="width:70px"></div>
      <button class="btn btn-gold" onclick="generateTokens()"><i class="fas fa-plus"></i> Generar</button>
    </div>
    <div id="gen-area" style="display:none">
      <div class="token-display" id="token-display" onclick="copyLast()" title="Clic para copiar">— — —</div>
      <div class="copy-hint">👆 Toca para copiar · Entrégalo al cliente con cada pedido</div>
      <div class="toast" id="toast"></div>
      <div class="actions-row" style="margin-top:.75rem;justify-content:center">
        <button class="btn btn-outline btn-sm" onclick="generateTokens()"><i class="fas fa-redo"></i> Nuevo</button>
        <button class="btn btn-outline btn-sm" onclick="printToken()"><i class="fas fa-print"></i> Imprimir</button>
      </div>
      <div class="session-tokens" id="session-tokens"></div>
    </div>
  </div>

  <!-- TOKENS ACTIVOS -->
  <div class="card">
    <div class="card-header">
      <h2>🔑 Tokens Activos</h2>
      <button class="btn btn-outline btn-sm" onclick="loadTokens()"><i class="fas fa-sync"></i> Refrescar</button>
    </div>
    <div id="tokens-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>

  <!-- RANKING -->
  <div class="card">
    <div class="card-header">
      <h2>🏆 Ranking del Mes</h2>
      <div class="actions-row">
        <button class="btn btn-outline btn-sm" onclick="loadRanking()"><i class="fas fa-sync"></i> Refrescar</button>
        <button class="btn btn-red btn-sm" onclick="clearMonthRanking()"><i class="fas fa-trash"></i> Cerrar mes</button>
      </div>
    </div>
    <div id="rank-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>

  <div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center">
    <a href="trivia.html" target="_blank" class="btn btn-outline"><i class="fas fa-external-link-alt"></i> Ver Trivia</a>
    <a href="index.html" class="btn btn-outline"><i class="fas fa-home"></i> Ir al Sitio</a>
    <button class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, deleteDoc, collection, query, orderBy, limit, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpSwCwCwGtm2EXML5HWFrajqfKeZMff48",
  authDomain: "latribuna90-static-web.firebaseapp.com",
  projectId: "latribuna90-static-web",
  storageBucket: "latribuna90-static-web.firebasestorage.app",
  messagingSenderId: "961712839386",
  appId: "1:961712839386:web:94e1a3f6a000c7d9a823e3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_HASH = 'tribuna2025$';
const sessionToks = [];
let lastToken = '';

// ── LOGIN ──────────────────────────────────────────────────
window.login = function() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    const now = new Date();
    document.getElementById('month-label').textContent =
      now.toLocaleDateString('es-CO',{month:'long',year:'numeric'});
    loadAll();
  } else {
    document.getElementById('login-err').textContent = 'Contraseña incorrecta';
  }
};
window.logout = function(){ location.reload(); };

async function loadAll(){ await Promise.all([loadStats(),loadTokens(),loadRanking()]); }

// ── STATS ──────────────────────────────────────────────────
async function loadStats() {
  const now = new Date();
  const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [tSnap, rSnap] = await Promise.all([
    getDocs(collection(db,'tokens')),
    getDocs(query(collection(db,'ranking'), where('month','==',month)))
  ]);
  let total=0, used=0;
  tSnap.forEach(d=>{ total++; if(d.data().used) used++; });
  document.getElementById('s-tokens').textContent = total;
  document.getElementById('s-used').textContent = used;
  document.getElementById('s-players').textContent = rSnap.size;
}

// ── TOKENS ─────────────────────────────────────────────────
function genCode() {
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return 'TRB-'+Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

window.generateTokens = async function() {
  const qty = parseInt(document.getElementById('gen-qty').value)||1;
  const snap = await getDocs(collection(db,'tokens'));
  const existing = new Set(); snap.forEach(d=>existing.add(d.id));
  const news = [];
  for(let i=0;i<qty;i++){
    let code; do{ code=genCode(); }while(existing.has(code));
    await setDoc(doc(db,'tokens',code),{used:false,created:serverTimestamp()});
    existing.add(code); news.push(code); sessionToks.push(code);
  }
  lastToken = news[news.length-1];
  document.getElementById('gen-area').style.display='block';
  document.getElementById('token-display').textContent = lastToken;
  document.getElementById('toast').textContent='';
  renderSessionToks();
  loadStats(); loadTokens();
};

function renderSessionToks(){
  const el=document.getElementById('session-tokens');
  if(!sessionToks.length){el.innerHTML='';return;}
  el.innerHTML=`<small style="color:var(--muted);font-size:.7rem;width:100%">Esta sesión:</small>`+
    sessionToks.map(t=>`<span class="badge badge-gold" onclick="copyText('${t}')">${t}</span>`).join('');
}

window.copyLast=function(){ copyText(lastToken); };
window.copyText=function(t){
  navigator.clipboard.writeText(t).then(()=>{
    document.getElementById('toast').textContent=`✅ Copiado: ${t}`;
    setTimeout(()=>{const el=document.getElementById('toast');if(el)el.textContent='';},2000);
  });
};

window.printToken=function(){
  const token=document.getElementById('token-display').textContent;
  const w=window.open('','_blank','width=420,height=320');
  w.document.write(`<html><body style="font-family:'Courier New';text-align:center;padding:2rem;background:#fff">
    <p style="font-size:15px;font-weight:bold">LA TRIBUNA 90 · Trivia Fútbol</p>
    <p style="font-size:11px;color:#666;margin:.5rem 0 1rem">boolify-ia.github.io/static-web-latribuna90/trivia.html</p>
    <div style="font-size:38px;font-weight:bold;letter-spacing:.2em;border:2px dashed #333;padding:1rem;display:inline-block">${token}</div>
    <p style="font-size:11px;color:#999;margin-top:1rem">Código de un solo uso · No compartir</p>
    </body></html>`);
  w.print();
};

async function loadTokens(){
  const el=document.getElementById('tokens-list');
  el.innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
  const snap=await getDocs(query(collection(db,'tokens'),orderBy('created','desc'),limit(50)));
  if(!snap.size){el.innerHTML='<div class="empty">No hay tokens creados aún</div>';return;}
  const rows=[];
  snap.forEach(d=>{
    const {used,usedBy}=d.data();
    rows.push(`<tr>
      <td class="mono">${d.id}</td>
      <td><span class="badge ${used?'badge-red':'badge-green'}">${used?'Usado':'Libre'}</span></td>
      <td>${usedBy||'—'}</td>
      <td><button class="btn btn-red btn-sm" onclick="delToken('${d.id}')"><i class="fas fa-trash"></i></button></td>
    </tr>`);
  });
  el.innerHTML=`<table><thead><tr><th>Código</th><th>Estado</th><th>Usado por</th><th></th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

window.delToken=async function(id){
  if(!confirm(`¿Eliminar token ${id}?`))return;
  await deleteDoc(doc(db,'tokens',id));
  loadTokens();loadStats();
};

// ── RANKING ────────────────────────────────────────────────
async function loadRanking(){
  const el=document.getElementById('rank-list');
  el.innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const snap=await getDocs(query(collection(db,'ranking'),where('month','==',month),orderBy('score','desc'),limit(30)));
  if(!snap.size){el.innerHTML='<div class="empty">No hay partidas registradas este mes</div>';return;}
  const medals=['🥇','🥈','🥉'];
  const items=[];snap.forEach(d=>items.push(d.data()));
  el.innerHTML=items.map((r,i)=>`
    <div class="rank-item">
      <div class="rank-pos">${medals[i]||i+1}</div>
      <div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-detail">${r.correct}/${r.correct+r.wrong} correctas · prom. ${r.avgTime}s · ${r.date}</div></div>
      <div class="rank-score">${r.score} pts</div>
    </div>`).join('');
}

window.clearMonthRanking=async function(){
  if(!confirm('¿Cerrar el mes y limpiar el ranking? Guarda el ganador antes.'))return;
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const snap=await getDocs(query(collection(db,'ranking'),where('month','==',month)));
  const dels=[];snap.forEach(d=>dels.push(deleteDoc(doc(db,'ranking',d.id))));
  await Promise.all(dels);
  loadRanking();loadStats();
};

window.loadTokens=loadTokens;
window.loadRanking=loadRanking;
</script>
</body>
</html>
